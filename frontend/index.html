<!DOCTYPE html>
<html>
<head>
<title>AI Inventory Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0f2c3f, #1f4e5f);
    color: #f5f5f5;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.navbar h2 { color: #e6c9a8; }

/* NAV HOVER */
.nav-links a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    position: relative;
}

.nav-links a:hover {
    color: #e6c9a8;
}

.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #e6c9a8;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

/* Layout */
.container { padding: 20px; }

.card {
    background: #1f4e5f;
    padding: 20px;
    margin: 10px;
    border-radius: 12px;
}

.grid {
    display: flex;
    gap: 10px;
}

.grid .card { flex: 1; }

select, input {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    background: #e6c9a8;
    color: #0f2c3f;
}

button {
    background: #d2a679;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: bold;
}

.alert-text {
    font-size: 18px;
    font-weight: bold;
    color: #d2a679;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>📊 Dashboard</h2>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="#">Prediction</a>
        <a href="analytics.html">Analytics</a>
    </div>
</div>

<div class="container">

<div class="card">
    <h3>Input</h3>
    <select id="store"></select>
    <select id="item"></select>
    <select id="days"></select>
    <input id="stock" type="number" placeholder="Stock">
    <button onclick="predict()">Predict</button>
</div>

<div class="grid">
    <div class="card">
        <h3>Total Demand</h3>
        <p id="total">--</p>
    </div>
    <div class="card">
        <h3>Recommended</h3>
        <p id="recommended">--</p>
    </div>
    <div class="card">
        <h3>Alert</h3>
        <p id="alertBox" class="alert-text">--</p>
    </div>
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;

for (let i = 1; i <= 10; i++)
    store.innerHTML += `<option value="${i}">Store ${i}</option>`;

for (let i = 1; i <= 50; i++)
    item.innerHTML += `<option value="${i}">Item ${i}</option>`;

for (let i = 1; i <= 10; i++)
    days.innerHTML += `<option value="${i}">${i} Days</option>`;

function predict() {

const data = {
    store: +store.value,
    item: +item.value,
    days: +days.value,
    stock: +stock.value
};

fetch("https://inventory-demand-forecasting.onrender.com/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
})
.then(res => res.json())
.then(data => {

    alertBox.innerText = data.alert;
    total.innerText = data.total_demand;
    recommended.innerText = data.recommended_stock;

    let values = data.daily_predictions.map(d => d.predicted_demand);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: values.map((_, i) => `Day ${i+1}`),
            datasets: [{
                data: values,
                borderColor: "#d2a679"
            }]
        }
    });

});
}
</script>

</body>
</html>
